<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detailed Engineering Report — LatticeFlow EDM</title>
  <script src="/static/js/theme.js?v=7"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/report.css?v=7" />
</head>
<body>
  <header class="report-header">
    <div class="header-top">
      <div>
        <p class="brand">LatticeFlow EDM</p>
        <h1>Detailed Engineering Report</h1>
        <p id="report-meta">Circularity & supporting-material analysis</p>
      </div>
      <div class="header-actions">
        <div class="theme-toggle" role="group" aria-label="Color theme">
          <button type="button" class="theme-btn active" data-theme="light" aria-pressed="true" title="Light theme">Light</button>
          <button type="button" class="theme-btn" data-theme="dark" aria-pressed="false" title="Dark theme">Dark</button>
        </div>
        <button onclick="window.print()" class="btn-print">Save as PDF / Print</button>
      </div>
    </div>
    <div id="header-verdict" class="header-verdict"></div>
  </header>
  <main id="report-body" class="report-body">
    <p class="loading">Loading report…</p>
  </main>
  <footer class="report-footer">
    <p>Generated by LatticeFlow EDM · ML + geometry engine · SEM-validated training data</p>
  </footer>
  <script src="/static/js/report.js"></script>
</body>
</html>
