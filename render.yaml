services:
  - type: web
    name: lattice-edm-analyzer
    runtime: python
    buildCommand: pip install -r requirements.txt && python -c "from circularity_predictor import train_and_save; train_and_save()"
    startCommand: gunicorn web_server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
